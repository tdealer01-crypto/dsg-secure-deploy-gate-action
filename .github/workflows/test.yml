name: test

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  bats:
    name: Bats – dsg-gate.sh behavioral tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y bats

      - name: Run Bats tests
        run: bats tests/test_dsg_gate.bats

  python:
    name: Python – verify-proof.py unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Python unit tests
        run: python3 -m pytest tests/test_verify_proof.py -v --tb=short
